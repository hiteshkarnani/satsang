<!DOCTYPE html>
<html lang="hi">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>आज का सत्संग</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #ece5dd;
}

.header {
  background: #075e54;
  color: white;
  padding: 16px;
  text-align: center;
}

.header .top { font-size: 20px; }
.header .bottom { font-size: 22px; margin-top: 4px; font-weight: bold; }

.container {
  max-width: 700px;
  margin: auto;
  padding: 10px;
}

.card {
  background: white;
  padding: 16px;
  margin-top: 15px;
  border-radius: 14px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.date {
  font-size: 15px;
  color: #555;
  font-weight: 500;
}

.text {
  margin-top: 12px;
  font-size: 18px;
  line-height: 1.7;
  white-space: pre-line;
}

audio {
  width: 100%;
  margin-top: 10px;
}

.controls {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  cursor: pointer;
}

.play { background: #075e54; color: white; }
.pause { background: #999; color: white; }
.share { background: #25D366; color: white; text-decoration: none; }

.footer {
  text-align: center;
  margin: 20px;
  color: #777;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="top">॥श्रीहरि:॥</div>
  <div class="bottom">आज का सत्संग</div>
</div>

<div class="container" id="content">
  <div style="text-align:center; margin-top:20px;">लोड हो रहा है...</div>
</div>

<div class="footer">सत्संग संग्रह</div>

<script>

// LOAD DATA
fetch('data.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {

  data.sort((a, b) => new Date(b.date) - new Date(a.date));

  let html = '';

  data.forEach((item, index) => {
    let d = new Date(item.date);

    let days = ["रविवार","सोमवार","मंगलवार","बुधवार","गुरुवार","शुक्रवार","शनिवार"];
    let months = ["जनवरी","फ़रवरी","मार्च","अप्रैल","मई","जून","जुलाई","अगस्त","सितंबर","अक्टूबर","नवंबर","दिसंबर"];

    let formatted = `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

    html += `
      <div class="card">
        <div class="date">${formatted}</div>

        <div class="controls">
          <button class="btn play" onclick="startAudio(${index})">▶️ सत्संग सुने</button>
          <button class="btn pause" onclick="pauseAudio(${index})">⏸️ Pause</button>

          <a 
            id="share${index}"
            target="_blank"
            class="btn share"
          >
            📤 WhatsApp पर शेयर करें
          </a>
        </div>

        <!-- FIXED AUDIO -->
        <audio id="audio${index}" controls preload="auto" src="${item.audio}" style="display:none;"></audio>

        <div class="text" id="text${index}">लोड हो रहा है...</div>
      </div>
    `;
  });

  document.getElementById('content').innerHTML = html;

  // LOAD TEXT FILE
  data.forEach((item, index) => {

    fetch(item.text + '?v=' + new Date().getTime())
      .then(res => res.text())
      .then(txt => {

        let cleanText = txt.replace(/\*/g, '');
        document.getElementById("text" + index).innerText = cleanText;

        let shareMsg = `॥श्रीहरि:॥ आज का सत्संग\n\n${cleanText}\n\n${window.location.href}`;

        document.getElementById("share" + index).href =
          "https://wa.me/?text=" + encodeURIComponent(shareMsg);

      });

  });

})
.catch(err => {
  document.getElementById('content').innerHTML = "डेटा लोड नहीं हो पाया";
  console.error(err);
});


// ▶️ PLAY (FIXED)
function startAudio(i) {
  const audio = document.getElementById("audio" + i);

  audio.style.display = "block";
  audio.load();   // 🔥 ensures proper loading
  audio.play().catch(e => {
    console.log("Play error:", e);
  });
}


// ⏸️ PAUSE
function pauseAudio(i) {
  document.getElementById("audio" + i).pause();
}

</script>

</body>
</html>
