<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>आज का सत्संग</title>

<link rel="icon" href="favicon.png">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #ece5dd;
}

.header {
  background: #075e54;
  color: white;
  padding: 16px;
  text-align: center;
  position: sticky;
  top: 0;
}

.header .top {
  font-size: 20px;
  font-weight: 600;
}

.header .bottom {
  font-size: 22px;
  margin-top: 4px;
  font-weight: bold;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 10px;
}

.card {
  background: white;
  padding: 16px;
  margin-top: 15px;
  border-radius: 14px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.date {
  font-size: 14px;
  color: #777;
}

.text {
  margin-top: 10px;
  font-size: 18px;
  line-height: 1.6;
}

audio {
  width: 100%;
  margin-top: 10px;
}

.share-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 12px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-size: 14px;
}

.footer {
  text-align: center;
  margin: 20px;
  color: #777;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="top">॥श्रीहरि:॥</div>
  <div class="bottom">आज का सत्संग</div>
</div>

<div class="container" id="content">
  <div style="text-align:center; margin-top:20px;">लोड हो रहा है...</div>
</div>

<div class="footer">सत्संग संग्रह</div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

  // Sort latest first
  data.sort((a, b) => new Date(b.date) - new Date(a.date));

  let html = '';

  data.forEach(item => {
    let d = new Date(item.date);

    let formatted = d.toLocaleDateString('hi-IN', {
      weekday:'long',
      year:'numeric',
      month:'long',
      day:'numeric'
    });

    let shareText = `🕉️ आज का सत्संग\n\n${formatted}\n\n${item.text}\n\n${window.location.href}`;

    html += `
      <div class="card">
        <div class="date">📅 ${formatted}</div>

        <audio controls src="${item.audio}"></audio>

        <div class="text">${item.text}</div>

        <a 
          href="https://wa.me/?text=${encodeURIComponent(shareText)}" 
          target="_blank"
          class="share-btn"
        >
          📤 WhatsApp पर शेयर करें
        </a>
      </div>
    `;
  });

  document.getElementById('content').innerHTML = html || "कोई सत्संग उपलब्ध नहीं है";
})
.catch(err => {
  document.getElementById('content').innerHTML = "डेटा लोड नहीं हो पाया";
  console.error(err);
});
</script>

</body>
</html>
