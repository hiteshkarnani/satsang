<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>आज का सत्संग</title>

<style>
body { margin:0; font-family:'Segoe UI'; background:#ece5dd; }

.header {
  background:#075e54; color:white; text-align:center; padding:15px;
}

.container { max-width:700px; margin:auto; padding:10px; }

.card {
  background:white; padding:15px; margin-top:15px;
  border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.text { white-space:pre-line; line-height:1.7; font-size:17px; }

.controls { margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; }

button, .share {
  padding:8px 12px; border:none; border-radius:8px;
  cursor:pointer; font-size:14px;
}

.play { background:#075e54; color:white; }
.pause { background:#999; color:white; }
.share { background:#25D366; color:white; text-decoration:none; }

audio { width:100%; margin-top:10px; }
</style>
</head>

<body>

<div class="header">
  <div>॥श्रीहरि:॥</div>
  <div>आज का सत्संग</div>
</div>

<div class="container" id="content"></div>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

  data.sort((a,b)=> new Date(b.date)-new Date(a.date));

  let html='';

  data.forEach((item,i)=>{

    let d=new Date(item.date);
    let formatted=d.toLocaleDateString('hi-IN',{
      weekday:'long',year:'numeric',month:'long',day:'numeric'
    });

    let shareText = `॥श्रीहरि:॥ आज का सत्संग\n\n${formatted}\n\n${item.text}\n\n${window.location.href}`;

    html+=`
    <div class="card">
      <div>📅 ${formatted}</div>

      <!-- AUDIO WITH TIMELINE -->
      <audio id="audio${i}" controls src="${item.audio}"></audio>

      <div class="controls">
        <button class="play" onclick="playAudio(${i})">▶️ सत्संग सुने</button>
        <button class="pause" onclick="pauseAudio(${i})">⏸️ Pause</button>

        <a href="https://wa.me/?text=${encodeURIComponent(shareText)}"
           target="_blank"
           class="share">
           📤 WhatsApp पर शेयर करें
        </a>
      </div>

      <div class="text">${item.text}</div>
    </div>
    `;
  });

  document.getElementById('content').innerHTML=html;
});

function playAudio(i){
  document.getElementById("audio"+i).play();
}

function pauseAudio(i){
  document.getElementById("audio"+i).pause();
}
</script>

</body>
</html>
